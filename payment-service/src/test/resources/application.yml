spring:
  datasource:
    url: jdbc:h2:mem:payments_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

app:
  kafka:
    topics:
      order-created: order.created
      payment-processed: payment.processed
      payment-failed: payment.failed
      payment-failed-dlt: payment.failed.DLT
  payment:
    success-rate: 1.0
    max-retry-attempts: 3
    retry-backoff-ms: 100
  idempotency:
    ttl-seconds: 3600
